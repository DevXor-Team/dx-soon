<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devxor Team - Coming Soon</title>
  <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/131761355">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ffffff',
            secondary: '#0a0c0e',
            tertiary: '#d74d2d',
            muted: '#888888',
            background: '#141414',
          },
          fontFamily: {
            sans: ['"DM Sans"', 'sans-serif'],
            cairo: ['Cairo', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cairo', 'DM Sans', sans-serif;
      background-color: #141414;
      color: #ffffff;
    }

    /* Hide scrollbar */
    ::-webkit-scrollbar {
      display: none;
    }
    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Shiny text animation */
    @keyframes shine {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .shiny-text {
      background: linear-gradient(120deg, #b5b5b5 0%, #b5b5b5 35%, #ffffff 50%, #b5b5b5 65%, #b5b5b5 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }

    /* Radial glow effect */
    .radial-glow {
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(215, 77, 45, 0.15), transparent 70%);
    }

    /* Floating particles */
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      25% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
      50% { transform: translateY(-10px) translateX(-10px); opacity: 0.4; }
      75% { transform: translateY(-30px) translateX(5px); opacity: 0.5; }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Pulse animation */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .pulse-ring {
      animation: pulse 3s ease-in-out infinite;
    }

    /* Fade in animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .fade-in-up-delay-1 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-up-delay-2 { animation-delay: 0.4s; opacity: 0; }
    .fade-in-up-delay-3 { animation-delay: 0.6s; opacity: 0; }
    .fade-in-up-delay-4 { animation-delay: 0.8s; opacity: 0; }

    /* Grid pattern */
    .grid-pattern {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
  <!-- Background layers -->
  <div class="absolute inset-0 bg-secondary -z-30"></div>
  <div class="absolute inset-0 grid-pattern -z-20"></div>
  <div class="absolute inset-0 radial-glow -z-10"></div>

  <!-- Floating particles -->
  <div class="absolute inset-0 overflow-hidden -z-10 pointer-events-none">
    <div class="particle w-2 h-2 bg-muted/40" style="left: 10%; top: 20%; animation: float 8s ease-in-out infinite;"></div>
    <div class="particle w-1.5 h-1.5 bg-muted/30" style="left: 25%; top: 60%; animation: float 10s ease-in-out infinite 1s;"></div>
    <div class="particle w-2.5 h-2.5 bg-tertiary/30" style="left: 80%; top: 30%; animation: float 7s ease-in-out infinite 0.5s;"></div>
    <div class="particle w-1 h-1 bg-muted/50" style="left: 70%; top: 70%; animation: float 9s ease-in-out infinite 2s;"></div>
    <div class="particle w-2 h-2 bg-muted/40" style="left: 40%; top: 80%; animation: float 11s ease-in-out infinite 1.5s;"></div>
    <div class="particle w-1.5 h-1.5 bg-tertiary/40" style="left: 15%; top: 85%; animation: float 8s ease-in-out infinite 2.5s;"></div>
    <div class="particle w-3 h-3 bg-muted/20" style="left: 90%; top: 50%; animation: float 12s ease-in-out infinite;"></div>
    <div class="particle w-1 h-1 bg-muted/60" style="left: 55%; top: 15%; animation: float 6s ease-in-out infinite 3s;"></div>
    <div class="particle w-2 h-2 bg-tertiary/30" style="left: 35%; top: 45%; animation: float 9s ease-in-out infinite 1.8s;"></div>
    <div class="particle w-1.5 h-1.5 bg-muted/35" style="left: 65%; top: 90%; animation: float 10s ease-in-out infinite 0.8s;"></div>
  </div>

  <!-- Main content -->
  <main class="flex flex-col items-center justify-center text-center px-6 max-w-2xl mx-auto">
    <!-- Logo/Brand -->
    <div class="fade-in-up fade-in-up-delay-1 mb-8">
      <div class="relative inline-flex items-center justify-center">
        <div class="absolute w-20 h-20 rounded-full border border-tertiary/30 pulse-ring"></div>
        <div class="absolute w-28 h-28 rounded-full border border-muted/20 pulse-ring" style="animation-delay: 0.5s;"></div>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight">
          <span class="text-white">Devxor</span>
          <span class="text-tertiary"> Team</span>
        </h1>
      </div>
    </div>

    <!-- Main message -->
    <div class="fade-in-up fade-in-up-delay-2">
      <h2 class="text-2xl md:text-3xl lg:text-4xl font-semibold mb-6 leading-tight">
        <span class="shiny-text">Coming Soon</span>
      </h2>
    </div>

    <!-- Description -->
    <div class="fade-in-up fade-in-up-delay-3 mb-10">
      <p class="text-muted text-base md:text-lg leading-relaxed max-w-lg">
        Preparation and setup are underway, and our services will be launched soon.
      </p>
    </div>

    <!-- Status indicator -->
    <div class="fade-in-up fade-in-up-delay-4 flex items-center gap-3 px-6 py-3 rounded-full bg-secondary/80 border border-muted/20 backdrop-blur-sm">
      <span class="relative flex h-3 w-3">
        <span class="absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75 animate-ping"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-tertiary"></span>
      </span>
      <span class="text-muted text-sm font-medium">In Development</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="absolute bottom-6 left-0 right-0 text-center">
    <p class="text-muted/60 text-sm">
      Building solutions you can rely on
    </p>
  </footer>
</body>
</html>
